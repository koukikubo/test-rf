default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  url: postgres://postgres:password@db:5432/rf_repeat_app_backend_development

test:
  <<: *default
  url: postgres://postgres:password@db:5432/rf_repeat_app_backend_test

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
