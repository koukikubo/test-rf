services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rf_repeat_app_backend_development
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./rf-repeat-app-backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./rf-repeat-app-backend:/app
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/rf_repeat_app_backend_development
    depends_on:
      - db
    command: bash -c "rm -f tmp/pids/server.pid && bin/rails s -p 3001 -b 0.0.0.0"

volumes:
  postgres-data:
